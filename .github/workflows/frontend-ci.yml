name: frontend-ci

on:
  push:
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
